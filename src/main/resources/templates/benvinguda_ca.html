<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        .button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        .footer {
            font-size: 12px;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="header">
    <img src="cid:logoImage" alt="GESCLUB Logo" class="logo">
</div>
<h2 th:text="'Hola, ' + ${nom} + '!'">H/ola!</h2>
<p>T'has registrat correctament a l'entorn de <strong th:text="${tenantNom}">Tenant</strong>.</p>

<p>Per començar a treballar, pots accedir des del següent enllaç:</p>
<a th:href="${urlLogin}" class="button">Accedir a l'Aplicació</a>

<div class="footer">
    <p>Aquest correu s'ha enviat a <span th:text="${email}"></span>.</p>
    <p>Si no has sol·licitat aquest registre, si us plau contacta amb suport.</p>
</div>
</body>
</html>
